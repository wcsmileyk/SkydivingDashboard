<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if dz %}{{ dz.name }}{% else %}Skydiving Dashboard{% endif %}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: grid;
      grid-template-rows: 55vh minmax(0, 1fr);
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    #map {
      grid-column: 1 / 3;
      grid-row: 1;
    }

    .panel {
      padding: 1rem 1.5rem;
      border-top: 2px solid #30363d;
      overflow-y: auto;
    }

    #weather-panel {
      grid-column: 1;
      border-right: 1px solid #30363d;
    }

    #spot-panel {
      grid-column: 2;
    }

    @media (max-width: 768px) {
      body {
        grid-template-rows: 45vh auto auto;
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
      }

      #map {
        grid-column: 1;
        grid-row: 1;
      }

      #weather-panel {
        grid-column: 1;
        grid-row: 2;
        border-right: none;
        border-bottom: 1px solid #30363d;
      }

      #spot-panel {
        grid-column: 1;
        grid-row: 3;
      }
    }

    .panel-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6e7681;
      margin-bottom: 0.75rem;
    }

    /* Weather rows */
    .weather-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0;
    }

    .weather-label {
      color: #6e7681;
      font-size: 0.78rem;
      padding: 0.35rem 1rem 0.35rem 0;
      border-bottom: 1px solid #161b22;
      white-space: nowrap;
    }

    .weather-value {
      font-size: 0.78rem;
      font-weight: bold;
      padding: 0.35rem 0;
      border-bottom: 1px solid #161b22;
    }

    .da-row .weather-label,
    .da-row .weather-value {
      border-bottom: none;
      padding-top: 0.6rem;
    }

    .da-number {
      font-size: 1.6rem;
      font-weight: bold;
      line-height: 1;
    }

    .da-green  { color: #3fb950; }
    .da-yellow { color: #d29922; }
    .da-red    { color: #f85149; }

    /* Spot panel */
    .no-spot {
      color: #6e7681;
      font-style: italic;
      font-size: 0.85rem;
    }

    .spot-run {
      font-size: 0.7rem;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    .spot-line {
      font-size: 1.15rem;
      font-weight: bold;
      color: #58a6ff;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .spot-notes {
      font-size: 0.82rem;
      color: #c9d1d9;
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    .spot-timestamp {
      font-size: 0.7rem;
      color: #6e7681;
      margin-top: 0.6rem;
    }

    /* Raw METAR */
    .raw-metar {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      color: #484f58;
      word-break: break-all;
      line-height: 1.4;
    }

    /* Leaflet overrides */
    .leaflet-container { background: #161b22; }

    .plane-div-icon { background: none !important; border: none !important; }

    .plane-wrap {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .plane-symbol {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      font-size: 20px;
      line-height: 1;
      color: #f0f6fc;
      text-shadow: 0 0 4px #000, 0 0 4px #000;
      /* translate is set inline so we can combine with rotate */
    }

    .plane-label {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      color: #f0f6fc;
      text-shadow: 0 0 3px #000, 0 0 3px #000, 0 0 3px #000;
      pointer-events: none;
      margin-bottom: 2px;
    }

    .dz-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #f85149;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      white-space: nowrap;
    }

    /* Upper winds table */
    .winds-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6e7681;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }

    .winds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .winds-table th {
      color: #6e7681;
      font-weight: normal;
      text-align: left;
      padding: 0.2rem 0.5rem 0.3rem 0;
      border-bottom: 1px solid #21262d;
    }

    .winds-table th:not(:first-child),
    .winds-table td:not(:first-child) {
      text-align: right;
      padding-right: 0;
    }

    .winds-table td {
      padding: 0.28rem 0.5rem 0.28rem 0;
      border-bottom: 1px solid #161b22;
    }

    .winds-table td:first-child {
      color: #6e7681;
      white-space: nowrap;
    }

    .winds-table tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="panel" id="weather-panel">
  <div class="panel-title">AWOS — {% if dz %}{{ dz.awos_station_id }}{% endif %}</div>
  <div id="weather-content"><span style="color:#6e7681;font-size:0.8rem;">Loading…</span></div>
</div>

<div class="panel" id="spot-panel">
  <div class="panel-title">Current Spot</div>
  <div id="spot-content"><span style="color:#6e7681;font-size:0.8rem;">Loading…</span></div>
  <div class="winds-title">Upper Winds Forecast (AGL)</div>
  <div id="winds-content"><span style="color:#6e7681;font-size:0.75rem;">Loading…</span></div>
</div>

<script>
  const DZ_LAT = {{ dz.latitude|default:"39.9" }};
  const DZ_LON = {{ dz.longitude|default:"-105.1" }};
  const DZ_NAME = "{{ dz.name|escapejs|default:'Drop Zone' }}";

  // ── Map ──────────────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([DZ_LAT, DZ_LON], 15);

  const streetLayer = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19,
    }
  );

  const satelliteLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: '© Esri',
      maxZoom: 19,
    }
  );

  satelliteLayer.addTo(map);

  L.control.layers(
    { 'Satellite': satelliteLayer, 'Dark': streetLayer },
    {},
    { position: 'topright' }
  ).addTo(map);



  // ── Aircraft ─────────────────────────────────────────────────────────────
  const aircraftMarkers = {};

  function makePlaneIcon(track, name) {
    // The ✈ Unicode character points East (90°) by default, so we subtract 90
    const rotationDeg = (track || 0) - 90;
    return L.divIcon({
      html: `<div class="plane-wrap">
               <div class="plane-label">${name}</div>
               <div class="plane-symbol" style="transform: translate(-50%, -50%) rotate(${rotationDeg}deg);">✈</div>
             </div>`,
      className: 'plane-div-icon',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });
  }

  function updateAircraft() {
    fetch('/api/aircraft/')
      .then(r => r.json())
      .then(aircraft => {
        const seen = new Set();

        aircraft.forEach(ac => {
          seen.add(ac.hex);
          const icon = makePlaneIcon(ac.track, ac.name);
          const altStr = ac.alt_baro != null ? ac.alt_baro.toLocaleString() + ' ft' : '—';
          const gsStr  = ac.gs != null ? Math.round(ac.gs) + ' kts' : '—';
          const popupHtml = `<b>${ac.name}</b><br>Alt: ${altStr}<br>GS: ${gsStr}`;

          if (aircraftMarkers[ac.hex]) {
            aircraftMarkers[ac.hex].setLatLng([ac.lat, ac.lon]);
            aircraftMarkers[ac.hex].setIcon(icon);
            aircraftMarkers[ac.hex].getPopup().setContent(popupHtml);
          } else {
            aircraftMarkers[ac.hex] = L.marker([ac.lat, ac.lon], { icon })
              .bindPopup(popupHtml)
              .addTo(map);
          }
        });

        // Remove markers for planes no longer in the feed
        Object.keys(aircraftMarkers).forEach(hex => {
          if (!seen.has(hex)) {
            map.removeLayer(aircraftMarkers[hex]);
            delete aircraftMarkers[hex];
          }
        });
      })
      .catch(() => {});
  }


  // ── Spot capsule geometry ─────────────────────────────────────────────────
  // Returns a polygon approximating a stadium/capsule shape.
  // Near end (spot lat/lon) has a semicircle cap; far end extends lengthMiles
  // along headingDeg and also has a semicircle cap. widthMiles is total width.
  function spotCapsule(lat, lon, headingDeg, lengthMiles, widthMiles) {
    const hw    = widthMiles / 2;
    const [fLat, fLon] = offsetPoint(lat, lon, headingDeg, lengthMiles);
    const steps = 12;
    const pts   = [];

    // Far-end semicircle: arc from (heading-90) to (heading+90) sweeping forward
    for (let i = 0; i <= steps; i++) {
      const b = ((headingDeg - 90) + 180 * i / steps + 360) % 360;
      pts.push(offsetPoint(fLat, fLon, b, hw));
    }
    // Near-end semicircle: arc from (heading+90) to (heading+270) sweeping backward
    for (let i = 0; i <= steps; i++) {
      const b = ((headingDeg + 90) + 180 * i / steps + 360) % 360;
      pts.push(offsetPoint(lat, lon, b, hw));
    }
    return pts;
  }


  // ── Spot ──────────────────────────────────────────────────────────────────
  let spotMarker = null;

  function updateSpot() {
    fetch('/api/spot/')
      .then(r => r.json())
      .then(data => {
        // Update map marker
        if (spotMarker) { map.removeLayer(spotMarker); spotMarker = null; }

        if (data.active && data.lat != null && data.lon != null) {
          // Capsule: spot lat/lon is the near end, extends 1.75 mi along heading, 0.1 mi wide
          const capsulePts = spotCapsule(data.lat, data.lon, data.heading, 1.75, 0.1);
          spotMarker = L.polygon(capsulePts, {
            color:       '#3fb950',
            fillColor:   '#3fb950',
            fillOpacity: 0.35,
            weight:      2,
            opacity:     0.6,
          }).addTo(map).bindPopup(`<b>Spot</b><br>Jump Run: ${data.heading}°`);
        }

        // Update panel
        const el = document.getElementById('spot-content');
        if (!data.active) {
          el.innerHTML = '<span class="no-spot">No active spot set.</span>';
          return;
        }

        const ts = new Date(data.dt_set).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const notesHtml = data.notes
          ? `<div class="spot-notes">${escapeHtml(data.notes)}</div>`
          : '';

        el.innerHTML = `
          <div class="spot-run">Jump Run ${data.heading}°</div>
          <div class="spot-line">
            ${data.offset_dist} mi ${data.offset_dir} offset
            &nbsp;|&nbsp;
            ${data.prior_dist} mi ${data.prior_label}
          </div>
          ${notesHtml}
          <div class="spot-timestamp">Set at ${ts}</div>
        `;
      })
      .catch(() => {});
  }


  // ── Landing Direction Arrow ───────────────────────────────────────────────
  let landingLayers = [];

  // Return a lat/lon offset from a point by a bearing and distance (miles)
  function offsetPoint(lat, lon, bearingDeg, distanceMiles) {
    const R  = 3959;
    const d  = distanceMiles / R;
    const b  = bearingDeg * Math.PI / 180;
    const φ1 = lat * Math.PI / 180;
    const λ1 = lon * Math.PI / 180;
    const φ2 = Math.asin(Math.sin(φ1) * Math.cos(d) + Math.cos(φ1) * Math.sin(d) * Math.cos(b));
    const λ2 = λ1 + Math.atan2(Math.sin(b) * Math.sin(d) * Math.cos(φ1), Math.cos(d) - Math.sin(φ1) * Math.sin(φ2));
    return [φ2 * 180 / Math.PI, λ2 * 180 / Math.PI];
  }

  function updateLandingArrow(windFromDeg, windSpeedKts) {
    landingLayers.forEach(l => map.removeLayer(l));
    landingLayers = [];

    // Calm winds — nothing meaningful to draw
    if (windSpeedKts < 3) return;

    // Land INTO the wind: landing heading = wind FROM direction
    const landingHeading = windFromDeg;
    const upwindDir = (landingHeading + 180) % 360;

    // DZ is the center — shaft extends 0.4 mi each way
    const shaftTail = offsetPoint(DZ_LAT, DZ_LON, upwindDir,      0.4);
    const tip       = offsetPoint(DZ_LAT, DZ_LON, landingHeading, 0.4);

    // Arrowhead: two lines from tip back toward tail, splayed 30° each side
    const headSize  = 0.12;
    const arrowLeft  = offsetPoint(tip[0], tip[1], (upwindDir - 30 + 360) % 360, headSize);
    const arrowRight = offsetPoint(tip[0], tip[1], (upwindDir + 30)        % 360, headSize);

    const style = { color: '#00cfff', weight: 20, opacity: 0.55, lineJoin: 'round', lineCap: 'round' };

    landingLayers = [
      L.polyline([shaftTail, tip],  style).addTo(map),
      L.polyline([tip, arrowLeft],  style).addTo(map),
      L.polyline([tip, arrowRight], style).addTo(map),
    ];
    landingLayers[0].bindTooltip(`Landing ${landingHeading}° (into wind)`, { sticky: true });
  }


  // ── Weather ───────────────────────────────────────────────────────────────
  function updateWeather() {
    fetch('/api/weather/')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('weather-content');

        if (data.error) {
          el.innerHTML = `<span style="color:#f85149;font-size:0.8rem;">Error: ${escapeHtml(data.error)}</span>`;
          return;
        }

        updateLandingArrow(data.wind_dir, data.wind_speed);

        const da = data.density_altitude;
        const daClass = da < 7500 ? 'da-green' : da < 9000 ? 'da-yellow' : 'da-red';
        const cloudsDisplay = data.clouds || 'CLR';
        const visDisplay = data.visibility !== '' ? `${data.visibility} SM` : '—';

        el.innerHTML = `
          <div class="weather-grid">
            <div class="weather-label">Ground Temp</div>
            <div class="weather-value">${data.temp_c}°C / ${data.temp_f}°F</div>

            <div class="weather-label">Wind</div>
            <div class="weather-value">${escapeHtml(data.wind_str)}</div>

            <div class="weather-label">Clouds</div>
            <div class="weather-value">${escapeHtml(cloudsDisplay)}</div>

            <div class="weather-label">Visibility</div>
            <div class="weather-value">${visDisplay}</div>

            <div class="weather-label">Pressure</div>
            <div class="weather-value">${data.altimeter_inhg} inHg</div>

            <div class="weather-label">Dew Point</div>
            <div class="weather-value">${data.dewpoint_c}°C</div>

            <div class="weather-label da-row">Density Alt</div>
            <div class="weather-value da-row">
              <span class="da-number ${daClass}">${da.toLocaleString()} ft</span>
            </div>
          </div>
          <div class="raw-metar">${escapeHtml(data.raw)}</div>
        `;
      })
      .catch(() => {
        document.getElementById('weather-content').innerHTML =
          '<span style="color:#6e7681;font-size:0.8rem;">Weather unavailable</span>';
      });
  }


  // ── Freefall drift ───────────────────────────────────────────────────────
  let driftPolygon = null;
  let driftLabel   = null;

  function updateDrift() {
    fetch('/api/drift/')
      .then(r => r.json())
      .then(data => {
        if (driftPolygon) { map.removeLayer(driftPolygon); driftPolygon = null; }
        if (driftLabel)   { map.removeLayer(driftLabel);   driftLabel   = null; }

        if (!data.active) return;

        // Red capsule at opening location, same shape as spot capsule
        const pts = spotCapsule(data.lat, data.lon, data.heading, 1.75, 0.1);
        driftPolygon = L.polygon(pts, {
          color:       '#f85149',
          fillColor:   '#f85149',
          fillOpacity: 0.35,
          weight:      2,
          opacity:     0.6,
        }).addTo(map).bindPopup(
          `<b>Est. Opening</b><br>Drift: ${data.drift_dist} mi @ ${data.drift_dir}°<br>Exit: ${data.exit_alt.toLocaleString()} ft AGL`
        );

        // Text label at center of capsule (0.875 mi = half of 1.75 mi length)
        const [cLat, cLon] = offsetPoint(data.lat, data.lon, data.heading, 0.875);
        driftLabel = L.marker([cLat, cLon], {
          icon: L.divIcon({
            html: '<div style="transform:translate(-50%,-50%);color:#fff;font-size:10px;font-weight:bold;font-family:\'Courier New\',monospace;text-shadow:0 0 3px #000,0 0 3px #000,0 0 3px #000;white-space:nowrap;">Est. Opening</div>',
            className:  '',
            iconSize:   [0, 0],
            iconAnchor: [0, 0],
          }),
          interactive: false,
          zIndexOffset: 1000,
        }).addTo(map);
      })
      .catch(() => {});
  }


  // ── Upper Winds ───────────────────────────────────────────────────────────
  function updateWinds() {
    fetch('/api/winds/')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('winds-content');

        if (data.error) {
          el.innerHTML = `<span style="color:#f85149;font-size:0.75rem;">Error: ${escapeHtml(data.error)}</span>`;
          return;
        }

        const rows = data.winds.map(w => {
          const altLabel = w.agl_ft >= 1000 ? `${(w.agl_ft / 1000).toFixed(0)}k ft` : `${w.agl_ft} ft`;
          const dirPadded = String(w.wind_dir).padStart(3, '0');
          return `<tr>
            <td>${altLabel}</td>
            <td>${dirPadded}° @ ${Math.round(w.wind_speed)}kts</td>
            <td>${w.temp_c}°C / ${w.temp_f}°F</td>
          </tr>`;
        }).join('');

        el.innerHTML = `
          <table class="winds-table">
            <thead>
              <tr>
                <th>Alt AGL</th>
                <th>Wind</th>
                <th>Temp</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      })
      .catch(() => {
        document.getElementById('winds-content').innerHTML =
          '<span style="color:#6e7681;font-size:0.75rem;">Winds unavailable</span>';
      });
  }


  // ── Utility ───────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }


  // ── Bootstrap ─────────────────────────────────────────────────────────────
  updateAircraft();
  updateWeather();
  updateSpot();
  updateDrift();
  updateWinds();

  setInterval(updateAircraft, 3000);    // 3s  — local ADS-B is fast
  setInterval(updateWeather,  60000);   // 1 min
  setInterval(updateSpot,     30000);   // 30s
  setInterval(updateDrift,    30000);   // 30s — depends on spot + winds
  setInterval(updateWinds,    300000);  // 5 min — Open-Meteo updates hourly
</script>

</body>
</html>
